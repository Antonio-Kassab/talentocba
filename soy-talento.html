<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Soy talento — TalentoCBA</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="description" content="Registro de actores — CastingCBA">
</head>
<body>
    <div class="app-shell">
        <header class="site-header">
            <div class="brand">
                <span class="brand-logo">TalentoCBA</span>
                <p class="brand-tag">Casting & Talento</p>
            </div>
            <nav class="main-nav" aria-label="Navegación principal">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="busco-talento.html" class="nav-link">Busco talento</a>
                <a href="soy-talento.html" class="nav-link">Soy talento</a>
                
                <a href="sobre-nosotros.html" class="nav-link">Sobre nosotros</a>
            </nav>
        </header>

        <main>
            <section id="registro" class="page-section section-registro">
                <div class="section-header">
                    <span class="eyebrow">Vista Actor</span>
                    <h2>Postulate como actor</h2>
                    <p>Completa tus datos para que los directores puedan encontrarte en el casting ideal.</p>
                </div>

                <div class="panel registro-panel">
                    <form id="formulario-actor" class="form-panel" novalidate>
                        <div class="form-group">
                            <label for="actor-nombre">Nombre completo</label>
                            <input type="text" id="actor-nombre" name="nombre" placeholder="Ej. Valentina Pérez" required>
                        </div>

                        <div class="form-group">
                            <label for="actor-edad">Edad</label>
                            <input type="number" id="actor-edad" name="edad" min="16" max="80" placeholder="Ej. 29" required>
                        </div>

                        <div class="form-group">
                            <label for="actor-email">Email</label>
                            <input type="email" id="actor-email" name="email" placeholder="tucorreo@ejemplo.com" required>
                        </div>

                        <div class="form-group">
                            <label for="actor-foto">Foto (URL)</label>
                            <input type="url" id="actor-foto" name="foto" placeholder="https://ejemplo.com/mi-foto.jpg">
                        </div>

                        <fieldset class="form-group skill-group">
                            <legend>Habilidades</legend>
                            <label class="checkbox-inline">
                                <input type="checkbox" name="habilidades" value="teatro-fisico">
                                Teatro físico
                            </label>
                            <label class="checkbox-inline">
                                <input type="checkbox" name="habilidades" value="canto">
                                Canto
                            </label>
                            <label class="checkbox-inline">
                                <input type="checkbox" name="habilidades" value="danza">
                                Danza
                            </label>
                            <label class="checkbox-inline">
                                <input type="checkbox" name="habilidades" value="actuacion-camara">
                                Actuación frente a cámara
                            </label>
                        </fieldset>

                        <button type="submit" class="btn-submit">Registrarse</button>
                    </form>
                </div>
            </section>
        </main>

        <footer id="footer" class="site-footer">
            <p>© 2026 CastingCBA. Plataforma de búsqueda y postulación de talentos.</p>
        </footer>
    </div>
</body>
</html>
